
syntax = "proto3";

package monitor;

service ConnectionMonitor {
  rpc Register(ClientInfo) returns (RegisterResponse);
  rpc Heartbeat(ClientHeartbeat) returns (HeartbeatResponse);
  rpc Unregister(ClientInfo) returns (UnregisterResponse);
}

message ClientInfo {
  string client_id = 1;
}

message RegisterResponse {
  bool success = 1;
}

message ClientHeartbeat {
  string client_id = 1;
}

message HeartbeatResponse {
  bool alive = 1;
}

message UnregisterResponse {
  bool success = 1;
}
